modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="bleachlizard"
description='''
A discovery-driven magic mod built on ThesisCore. Decode a lost arcane language through research, experimentation, and interpretation — at your own risk.
'''

# ThesisCore is required at runtime.
[[dependencies.grimarcana]]
    modId="thesiscore"
    type="required"
    versionRange="[1.0.0,)"
    ordering="BEFORE"
    side="BOTH"

[[dependencies.grimarcana]]
    modId="neoforge"
    type="required"
    versionRange="${loader_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.grimarcana]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
